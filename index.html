<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lizard Clicker 🦎</title>
  <style>
    :root { --primary: #00ff88; }
    body {
      background: linear-gradient(135deg, #0a1f0a, #132913, #0a1f0a);
      color: #bbffbb;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    h1 { font-size: 3.2rem; margin: 10px 0; background: linear-gradient(90deg, #00ff88, #aaffaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #lizard { width: 280px; height: 280px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 35px var(--primary)); }
    #lizard:active { transform: scale(0.82); }
    #score { font-size: 2.8rem; font-weight: bold; margin: 10px 0; }
    #event { color: #ffff00; font-weight: bold; min-height: 32px; }

    .container { max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .panel { background: #1a2f1a; border: 2px solid #335533; border-radius: 20px; padding: 20px; width: 380px; box-shadow: 0 10px 30px rgba(0,255,100,0.1); }
    .shop-item, .skin-item {
      background: #223322;
      margin: 12px 0;
      padding: 15px;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid var(--primary);
    }
    button {
      padding: 12px 24px;
      background: linear-gradient(#00ff88, #00cc66);
      color: black;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled { background: #334433; color: #666; }
    .reset-btn { background: #aa0000; margin: 5px; }
  </style>
</head>
<body>
  <h1>🦎 Lizard Clicker</h1>
  <div id="score">0 Lizards</div>
  <div id="event"></div>
  <img id="lizard" src="lizzard.png" onclick="clickLizard()">

  <div class="container">
    <div class="panel">
      <h2>🛒 Upgrades</h2>
      <div id="upgrades"></div>
    </div>
    <div class="panel">
      <h2>✨ Lizard Skins</h2>
      <div id="skins"></div>
    </div>
  </div>

  <div style="margin-top:30px;">
    <button onclick="startMiniGame()" style="background:#ff8800;">🚀 2X MINI-GAME</button>
    <button onclick="resetLizards()" class="reset-btn">Reset Lizards</button>
    <button onclick="resetUpgrades()" class="reset-btn">Reset Upgrades</button>
    <button onclick="resetGame()" class="reset-btn">Full Reset</button>
  </div>

  <!-- GELUIDEN -->
  <audio id="clickSound" preload="auto">
    <source src="lizard-button.mp3" type="audio/mpeg">
  </audio>
  <audio id="buySound" preload="auto">
    <source src="https://freesound.org/data/previews/66/66928_931655-lq.mp3" type="audio/mpeg">
  </audio>

  <script>
    let score = 0;
    let perSecond = 0;
    let personalBest = 0;
    let currentSkin = 0;
    let ownedSkins = [0];
    let is2xActive = false;

    const skins = [
      { id:0, name:"Green Lizard", emoji:"🦎", price:0, multiplier:0, src:"lizzard.png" },
      { id:1, name:"Fire Lizard", emoji:"🔥🦎", price:12000, multiplier:1, src:"vuurlizzard.png" },
      { id:2, name:"Ice Lizard", emoji:"❄️🦎", price:28000, multiplier:2, src:"ijslizzard.png" },
      { id:3, name:"Golden Lizard", emoji:"✨🦎", price:65000, multiplier:3, src:"goudelizard.png" },
      { id:4, name:"Diamond Lizard", emoji:"💎🦎", price:150000, multiplier:4, src:"diamantelizzard.png" },
      { id:5, name:"Pixel Lizard", emoji:"🕹️🦎", price:3000000, multiplier:5, src:"pixel lizzard.png" }
    ];

    let upgrades = [
      { id:1, name:"Baby Lizard", amount:2, cost:25, owned:0 },
      { id:2, name:"Rock Spot", amount:8, cost:150, owned:0 },
      { id:3, name:"Insect Farm", amount:30, cost:600, owned:0 },
      { id:4, name:"Jungle Tree", amount:90, cost:2500, owned:0 },
      { id:5, name:"Lizard Trainer", amount:280, cost:9000, owned:0 }
    ];

    const clickSound = document.getElementById("clickSound");
    const buySound = document.getElementById("buySound");

    function updateScore() {
      document.getElementById("score").textContent = Math.floor(score).toLocaleString('en-US') + " Lizards";
    }

    function clickLizard() {
      const mult = skins.find(s => s.id === currentSkin).multiplier;
      let amount = 1 + mult;
      if (is2xActive) amount *= 2;
      score += amount;

      // Geluid bij klikken
      clickSound.currentTime = 0;
      clickSound.play().catch(() => {});

      updateScore();
    }

    function buyUpgrade(id) {
      let up = upgrades.find(u => u.id === id);
      if (!up || score < up.cost) return;
      score -= up.cost;
      up.owned++;
      perSecond += up.amount;
      up.cost = Math.floor(up.cost * 1.48);

      buySound.currentTime = 0;
      buySound.play().catch(() => {});

      renderUpgrades();
      updateScore();
      saveGame();
    }

    function buySkin(id) {
      let skin = skins.find(s => s.id === id);
      if (!skin) return;
      if (!ownedSkins.includes(id)) {
        if (score < skin.price) return;
        score -= skin.price;
        ownedSkins.push(id);
      }
      currentSkin = id;
      document.getElementById("lizard").src = skin.src;

      buySound.currentTime = 0;
      buySound.play().catch(() => {});

      renderSkins();
      updateScore();
      saveGame();
    }

    // ... (de rest van de code blijft hetzelfde als vorige versie) ...

    function renderUpgrades() {
      let html = '';
      upgrades.forEach(up => {
        html += `<div class="shop-item"><div><strong>${up.name}</strong><br><small>+${up.amount}/sec • Owned: ${up.owned}</small></div><div><strong>${up.cost.toLocaleString()}</strong> 🦎<br><button onclick="buyUpgrade(${up.id})" ${score < up.cost ? 'disabled' : ''}>Buy</button></div></div>`;
      });
      document.getElementById("upgrades").innerHTML = html;
    }

    function renderSkins() {
      let html = '';
      skins.forEach(s => {
        const owned = ownedSkins.includes(s.id);
        const equipped = currentSkin === s.id;
        const btnText = equipped ? 'Equipped' : (owned ? 'Select' : 'Buy');
        html += `<div class="skin-item"><div style="font-size:2rem">${s.emoji}</div><div><strong>${s.name}</strong><br>${s.price === 0 ? 'Default' : s.price.toLocaleString() + ' Lizards'}<br><small>${s.multiplier}x</small></div><button onclick="buySkin(${s.id})" ${equipped ? 'disabled' : ''}>${btnText}</button></div>`;
      });
      document.getElementById("skins").innerHTML = html;
    }

    function saveGame() {
      localStorage.setItem("lizardClickerUltimate", JSON.stringify({score, upgrades, personalBest, currentSkin, ownedSkins, lastSaveTime: Date.now()}));
    }

    function loadGame() {
      const data = JSON.parse(localStorage.getItem("lizardClickerUltimate") || "{}");
      score = data.score || 0;
      personalBest = data.personalBest || 0;
      currentSkin = data.currentSkin || 0;
      ownedSkins = data.ownedSkins || [0];
      if (data.upgrades) upgrades = data.upgrades;
      perSecond = upgrades.reduce((sum, u) => sum + u.amount * u.owned, 0);

      if (data.lastSaveTime) score += Math.floor((Date.now() - data.lastSaveTime)/1000 * perSecond * 0.75);

      document.getElementById("lizard").src = skins[currentSkin].src;
      updateScore();
      renderUpgrades();
      renderSkins();
    }

    setInterval(() => {
      score += perSecond / 10;
      updateScore();
      renderUpgrades();
      renderSkins();
    }, 100);

    setInterval(saveGame, 10000);
    window.onload = loadGame;
  </script>
</body>
</html>
